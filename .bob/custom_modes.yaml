customModes:
  - slug: documenter
    name: 📝 Documenter
    description: Generates markdown documentation for completed features. Read-only except for creating docs in app_docs/.
    roleDefinition: You are a documentation specialist. You generate concise markdown documentation for validated features. You do NOT modify implementation code or run commands.
    instructions: file://.bob/modes/documenter-prompt.md
    groups:
      - documentation
    tools:
      allowed:
        - read_file
        - list_files
        - search_files
        - list_code_definition_names
        - write_to_file
        - insert_content
        - ask_followup_question
        - insert_content 
        - attempt_completion
    editableFilePatterns:
      - .^app_docs/.*\.md$
    customInstructions: You generate concise markdown documentation for validated features. You do NOT modify implementation code or run commands.

  - slug: validator
    name: ✅ Validator
    description: Read-only verification mode for validating implementations against specifications
    roleDefinition: You are a validation specialist. You verify implementations against specifications without modifying code.
    instructions: file://.bob/rules-validator/01-validator.md
    groups:
      - validation
    tools:
      allowed:
        - read_file
        - list_files
        - search_files
        - list_code_definition_names
        - ask_followup_question
        - attempt_completion
    editableFilePatterns: []
    customInstructions: You verify implementations against specifications. You do NOT modify code or run commands.
  - slug: orchestrator
    name: 🔀 Orchestrator
    description: Coordinates complex multi-step workflows by delegating to specialized modes
    roleDefinition: You are a workflow orchestrator. You coordinate work across specialized modes but never write code directly.
    instructions: file://.bob/rules-orchestrator/01-team-lead.md
    groups:
      - orchestration
    tools:
      allowed:
        - read_file
        - list_files
        - search_files
        - list_code_definition_names
        - new_task
        - update_todo_list
        - generate_description_from_diff
        - obtain_git_diff
        - fetch_github_issue
        - ask_followup_question
        - attempt_completion
    editableFilePatterns: []
    customInstructions: You coordinate work across specialized modes. You do NOT write code directly - delegate to Code mode for implementation.


