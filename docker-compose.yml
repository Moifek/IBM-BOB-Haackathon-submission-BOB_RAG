services:
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bobrag-network

  bobrag:
    build: .
    depends_on:
      qdrant:
        condition: service_healthy
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=bobrag_medical
    volumes:
      - ./data:/app/data
    networks:
      - bobrag-network
    # No default command - use docker compose run bobrag <command>

volumes:
  qdrant_storage:

networks:
  bobrag-network:
    driver: bridge
