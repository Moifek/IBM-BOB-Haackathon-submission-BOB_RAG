version: '3.8'

services:
  # Ollama service for LLM and embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: docrag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # One-shot service to pull required models
  ollama-init:
    image: ollama/ollama:latest
    container_name: docrag-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling llama3.2:3b-instruct model..."
        ollama pull llama3.2:3b-instruct
        echo "Pulling nomic-embed-text model..."
        ollama pull nomic-embed-text
        echo "Models pulled successfully!"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # FastAPI backend service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docrag-api
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_LLM_MODEL=llama3.2:3b-instruct
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - API_PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # React frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: docrag-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local

